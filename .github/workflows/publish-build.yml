name: Publish Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - fix_causale_pur.py
      - config.json
      - build/README-build.md
      - .github/workflows/publish-build.yml

permissions:
  contents: write

concurrency:
  group: publish-build
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build Windows executable
        run: python -m PyInstaller --onefile --name elimina-spazi fix_causale_pur.py

      - name: Prepare branch contents
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/elimina-spazi.exe package/elimina-spazi.exe
          Copy-Item config.json package/config.json
          Copy-Item build/README-build.md package/README.md

          @"
          {
            "source_branch": "${{ github.ref_name }}",
            "source_commit": "${{ github.sha }}",
            "build_time_utc": "$(Get-Date -AsUTC -Format o)",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          "@ | Set-Content -Encoding UTF8 package/build-info.json

          $hash = (Get-FileHash package/elimina-spazi.exe -Algorithm SHA256).Hash.ToLower()
          "SHA256  elimina-spazi.exe  $hash" | Set-Content -Encoding ascii package/SHA256SUMS.txt

      - name: Upload branch package
        uses: actions/upload-artifact@v4
        with:
          name: build-branch-package
          path: package/*
          if-no-files-found: error

  publish-build-branch:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: build-branch-package
          path: publish

      - name: Publish build branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd publish
          git init
          git checkout -b build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Build from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin build

